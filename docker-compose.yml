version: '3.8'

services:
  reportserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: reportserver:latest
    container_name: report-server
    ports:
      - "8080:8080"
    volumes:
      # Persist H2 database and report data
      - ./data:/app/data
      # Optionally mount report templates directory
      - ./data/reports:/app/data/reports
    environment:
      # Server configuration
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=Reports Server
      
      # Database configuration
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/reportserver;AUTO_SERVER=TRUE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      
      # JVM memory settings (adjust based on your needs)
      - JAVA_OPTS=-Xmx1g -Xms512m
      
      # Logging level - use INFO for production
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_REPORTSERVER=INFO
      
      # File upload limits
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=50MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=50MB
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    networks:
      - reportserver-network

networks:
  reportserver-network:
    driver: bridge

volumes:
  # Named volumes for data persistence (alternative to bind mounts)
  reportserver-data:
    driver: local
