<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - JasperReports Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .user-info {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            font-weight: 500;
        }
        .btn-link {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-link:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .users-table th {
            background: #f8f9ff;
            color: #667eea;
            font-weight: 600;
        }
        .users-table tr:hover {
            background: #f8f9ff;
        }
        .btn-small {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 5px;
        }
        .btn-small:hover {
            background: #764ba2;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-admin {
            background: #667eea;
            color: white;
        }
        .badge-user {
            background: #e0e0e0;
            color: #666;
        }
        .badge-enabled {
            background: #28a745;
            color: white;
        }
        .badge-disabled {
            background: #dc3545;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .modal-header h3 {
            color: #667eea;
        }
        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        .close:hover {
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        #message {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 User Management</h1>
            <div class="user-info">
                <span>👤 <span sec:authentication="name">User</span></span>
                <a th:href="@{/}" class="btn-link">← Back to Dashboard</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn-link">Logout</button>
                </form>
            </div>
        </div>
        
        <div class="card">
            <h2>🔐 Manage Users</h2>
            <button class="btn" onclick="openUserModal()">➕ Add New User</button>
            <table class="users-table" id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; color: #999;">Loading users...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeUserModal()">&times;</span>
                <h3 id="modalTitle">Add User</h3>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="role">Role:</label>
                    <select id="role" name="role" required>
                        <option value="USER">User</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="enabled" name="enabled" checked>
                    <label for="enabled">Enabled</label>
                </div>
                <button type="submit" class="btn">Save</button>
                <div id="userMessage" style="margin-top: 15px;"></div>
            </form>
        </div>
    </div>

    <script>
        // Load users on page load
        window.onload = function() {
            loadUsers();
        };

        function loadUsers() {
            fetch('/api/users')
            .then(response => response.json())
            .then(users => {
                const tableBody = document.getElementById('usersTableBody');
                tableBody.innerHTML = '';
                
                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No users found</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const row = document.createElement('tr');
                    
                    const idCell = document.createElement('td');
                    idCell.textContent = user.id;
                    
                    const usernameCell = document.createElement('td');
                    usernameCell.textContent = user.username;
                    
                    const emailCell = document.createElement('td');
                    emailCell.textContent = user.email;
                    
                    const roleCell = document.createElement('td');
                    const roleBadge = document.createElement('span');
                    roleBadge.className = user.role === 'ADMIN' ? 'badge badge-admin' : 'badge badge-user';
                    roleBadge.textContent = user.role;
                    roleCell.appendChild(roleBadge);
                    
                    const statusCell = document.createElement('td');
                    const statusBadge = document.createElement('span');
                    statusBadge.className = user.enabled ? 'badge badge-enabled' : 'badge badge-disabled';
                    statusBadge.textContent = user.enabled ? 'Enabled' : 'Disabled';
                    statusCell.appendChild(statusBadge);
                    
                    const createdCell = document.createElement('td');
                    createdCell.textContent = new Date(user.createdAt).toLocaleDateString();
                    
                    const actionsCell = document.createElement('td');
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn-small';
                    editBtn.textContent = 'Edit';
                    editBtn.onclick = () => editUser(user.id);
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn-small btn-danger';
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.onclick = () => deleteUser(user.id);
                    
                    actionsCell.appendChild(editBtn);
                    actionsCell.appendChild(deleteBtn);
                    
                    row.appendChild(idCell);
                    row.appendChild(usernameCell);
                    row.appendChild(emailCell);
                    row.appendChild(roleCell);
                    row.appendChild(statusCell);
                    row.appendChild(createdCell);
                    row.appendChild(actionsCell);
                    
                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error loading users:', error);
            });
        }

        function openUserModal(userId = null) {
            const modal = document.getElementById('userModal');
            const form = document.getElementById('userForm');
            const title = document.getElementById('modalTitle');
            const passwordGroup = document.getElementById('passwordGroup');
            
            form.reset();
            document.getElementById('userMessage').innerHTML = '';
            document.getElementById('enabled').checked = true;
            
            if (userId) {
                title.textContent = 'Edit User';
                passwordGroup.style.display = 'none';
                
                fetch('/api/users/' + userId)
                .then(response => response.json())
                .then(user => {
                    document.getElementById('userId').value = user.id;
                    document.getElementById('username').value = user.username;
                    document.getElementById('username').readOnly = true;
                    document.getElementById('email').value = user.email;
                    document.getElementById('role').value = user.role;
                    document.getElementById('enabled').checked = user.enabled;
                });
            } else {
                title.textContent = 'Add User';
                document.getElementById('userId').value = '';
                document.getElementById('username').readOnly = false;
                passwordGroup.style.display = 'block';
            }
            
            modal.style.display = 'block';
        }

        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function editUser(id) {
            openUserModal(id);
        }

        function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            fetch('/api/users/' + id, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                alert('Failed to delete user: ' + error);
            });
        }

        document.getElementById('userForm').onsubmit = function(e) {
            e.preventDefault();
            
            const id = document.getElementById('userId').value;
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                enabled: document.getElementById('enabled').checked
            };
            
            if (!id) {
                formData.password = document.getElementById('password').value;
            }
            
            const url = id ? '/api/users/' + id : '/api/users';
            const method = id ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showUserMessage(data.message, 'success');
                    setTimeout(() => {
                        closeUserModal();
                        loadUsers();
                    }, 1500);
                } else {
                    showUserMessage(data.message, 'error');
                }
            })
            .catch(error => {
                showUserMessage('Failed to save user: ' + error, 'error');
            });
        };

        function showUserMessage(text, type) {
            const msg = document.getElementById('userMessage');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('userModal');
            if (event.target === modal) {
                closeUserModal();
            }
        };
    </script>
</body>
</html>
