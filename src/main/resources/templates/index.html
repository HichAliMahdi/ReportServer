<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JasperReports Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        #message {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .report-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .report-item {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 JasperReports Server</h1>
        
        <!-- Upload Section -->
        <div class="card">
            <h2>📤 Upload JRXML Report</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p style="font-size: 48px; margin-bottom: 10px;">📁</p>
                <p style="color: #667eea; font-size: 18px;">Click to select JRXML file</p>
                <p style="color: #999; margin-top: 10px;">or drag and drop here</p>
            </div>
            <input type="file" id="fileInput" accept=".jrxml" onchange="uploadFile()">
            <div id="message"></div>
        </div>

        <!-- Generate Report Section -->
        <div class="card">
            <h2>⚡ Generate Report</h2>
            <form id="generateForm">
                <div class="form-group">
                    <label for="reportSelect">Select Report:</label>
                    <select id="reportSelect" name="reportName" required>
                        <option value="">-- Select a report --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="formatSelect">Output Format:</label>
                    <select id="formatSelect" name="format">
                        <option value="pdf">PDF</option>
                        <option value="xlsx">Excel (XLSX)</option>
                    </select>
                </div>

                <button type="submit" class="btn">Generate Report</button>
            </form>
        </div>

        <!-- Available Reports -->
        <div class="card">
            <h2>📋 Available Reports</h2>
            <div id="reportList" class="report-list"></div>
        </div>
    </div>

    <script>
        // Load reports on page load
        window.onload = function() {
            loadReports();
        };

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                showMessage(data, 'success');
                loadReports();
                fileInput.value = '';
            })
            .catch(error => {
                showMessage('Upload failed: ' + error, 'error');
            });
        }

        function loadReports() {
            fetch('/reports')
            .then(response => response.json())
            .then(reports => {
                const select = document.getElementById('reportSelect');
                const list = document.getElementById('reportList');
                
                // Clear existing options (keep first one)
                select.innerHTML = '<option value="">-- Select a report --</option>';
                list.innerHTML = '';
                
                if (reports.length === 0) {
                    list.innerHTML = '<p style="color: #999;">No reports uploaded yet</p>';
                    return;
                }

                reports.forEach(report => {
                    // Add to dropdown
                    const option = document.createElement('option');
                    option.value = report;
                    option.textContent = report;
                    select.appendChild(option);

                    // Add to list
                    const item = document.createElement('div');
                    item.className = 'report-item';
                    item.textContent = report;
                    list.appendChild(item);
                });
            });
        }

        document.getElementById('generateForm').onsubmit = function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const params = new URLSearchParams(formData);

            fetch('/generate?' + params.toString(), {
                method: 'POST'
            })
            .then(response => {
                if (!response.ok) throw new Error('Generation failed');
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const format = formData.get('format');
                const reportName = formData.get('reportName').replace('.jrxml', '');
                a.download = reportName + '.' + format;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                showMessage('Report generated successfully!', 'success');
            })
            .catch(error => {
                showMessage('Generation failed: ' + error, 'error');
            });
        };

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        // Drag and drop support
        const uploadArea = document.querySelector('.upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8ebff';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#f8f9ff';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9ff';
            const fileInput = document.getElementById('fileInput');
            fileInput.files = e.dataTransfer.files;
            uploadFile();
        });
    </script>
</body>
</html>
