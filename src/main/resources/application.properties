# Server configuration
server.port=8080
spring.application.name=Reports Server

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# H2 Database for storing datasource configurations
spring.datasource.url=jdbc:h2:file:./data/reportserver;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (optional, for debugging - disable in production)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Logging (adjust based on environment)
logging.level.root=INFO
logging.level.com.reportserver=INFO

# ReportServer Font Configuration
net.sf.jasperreports.awt.ignore.missing.font=true
net.sf.jasperreports.default.font.name=SansSerif
net.sf.jasperreports.default.pdf.font.name=Helvetica

# Actuator endpoints for health monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Error handling configuration
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.path=/error
