<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JasperReports Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .tab.active {
            background: white;
            color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        select, input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        #message {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .report-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .report-item {
            padding: 15px;
            background: #f8f9ff;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        .datasource-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .datasource-table th, .datasource-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .datasource-table th {
            background: #f8f9ff;
            color: #667eea;
            font-weight: 600;
        }
        .datasource-table tr:hover {
            background: #f8f9ff;
        }
        .btn-small {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 5px;
        }
        .btn-small:hover {
            background: #764ba2;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .modal-header h3 {
            color: #667eea;
        }
        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
        }
        .close:hover {
            color: #333;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 JasperReports Server</h1>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('reports')">Reports</button>
            <button class="tab" onclick="switchTab('datasources')">Datasources</button>
        </div>

        <!-- Reports Tab -->
        <div id="reportsTab" class="tab-content active">
            <!-- Upload Section -->
            <div class="card">
                <h2>📤 Upload JRXML Report</h2>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <p style="font-size: 48px; margin-bottom: 10px;">📁</p>
                    <p style="color: #667eea; font-size: 18px;">Click to select JRXML file</p>
                    <p style="color: #999; margin-top: 10px;">or drag and drop here</p>
                </div>
                <input type="file" id="fileInput" accept=".jrxml" onchange="uploadFile()">
                <div id="message"></div>
            </div>

            <!-- Generate Report Section -->
            <div class="card">
                <h2>⚡ Generate Report</h2>
                <form id="generateForm">
                    <div class="form-group">
                        <label for="reportSelect">Select Report:</label>
                        <select id="reportSelect" name="reportName" required>
                            <option value="">-- Select a report --</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="formatSelect">Output Format:</label>
                        <select id="formatSelect" name="format">
                            <option value="pdf">PDF</option>
                            <option value="xlsx">Excel (XLSX)</option>
                        </select>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="useDatabaseCheck" name="useDatabase">
                        <label for="useDatabaseCheck">Use Database Connection</label>
                    </div>

                    <div class="form-group" id="datasourceGroup" style="display: none;">
                        <label for="datasourceSelect">Select Datasource:</label>
                        <select id="datasourceSelect" name="datasourceId">
                            <option value="">-- Use default datasource --</option>
                        </select>
                    </div>

                    <button type="submit" class="btn">Generate Report</button>
                </form>
            </div>

            <!-- Available Reports -->
            <div class="card">
                <h2>📋 Available Reports</h2>
                <div id="reportList" class="report-list"></div>
            </div>
        </div>

        <!-- Datasources Tab -->
        <div id="datasourcesTab" class="tab-content">
            <div class="card">
                <h2>🗄️ Datasource Management</h2>
                <button class="btn" onclick="openDatasourceModal()">➕ Add New Datasource</button>
                <table class="datasource-table" id="datasourceTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>URL</th>
                            <th>Username</th>
                            <th>Driver</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="datasourceTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #999;">No datasources configured</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Datasource Modal -->
    <div id="datasourceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeDatasourceModal()">&times;</span>
                <h3 id="modalTitle">Add Datasource</h3>
            </div>
            <form id="datasourceForm">
                <input type="hidden" id="datasourceId">
                <div class="form-group">
                    <label for="dsName">Name:</label>
                    <input type="text" id="dsName" name="name" required placeholder="My Database">
                </div>
                <div class="form-group">
                    <label for="dsUrl">JDBC URL:</label>
                    <input type="text" id="dsUrl" name="url" required 
                           placeholder="jdbc:mysql://localhost:3306/mydb">
                </div>
                <div class="form-group">
                    <label for="dsUsername">Username:</label>
                    <input type="text" id="dsUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="dsPassword">Password:</label>
                    <input type="password" id="dsPassword" name="password" required>
                </div>
                <div class="form-group">
                    <label for="dsDriver">Driver Class:</label>
                    <select id="dsDriver" name="driverClassName" required>
                        <option value="com.mysql.cj.jdbc.Driver">MySQL (com.mysql.cj.jdbc.Driver)</option>
                        <option value="org.postgresql.Driver">PostgreSQL (org.postgresql.Driver)</option>
                    </select>
                </div>
                <button type="button" class="btn" onclick="testDatasourceConnection()">Test Connection</button>
                <button type="submit" class="btn">Save</button>
                <div id="datasourceMessage" style="margin-top: 15px;"></div>
            </form>
        </div>
    </div>

    <script>
        // Load data on page load
        window.onload = function() {
            loadReports();
            loadDatasources();
        };

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            if (tabName === 'reports') {
                document.getElementById('reportsTab').classList.add('active');
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else if (tabName === 'datasources') {
                document.getElementById('datasourcesTab').classList.add('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
                loadDatasources();
            }
        }

        // Toggle datasource dropdown visibility
        document.getElementById('useDatabaseCheck').addEventListener('change', function() {
            const datasourceGroup = document.getElementById('datasourceGroup');
            datasourceGroup.style.display = this.checked ? 'block' : 'none';
        });

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                showMessage(data, 'success');
                loadReports();
                fileInput.value = '';
            })
            .catch(error => {
                showMessage('Upload failed: ' + error, 'error');
            });
        }

        function loadReports() {
            fetch('/reports')
            .then(response => response.json())
            .then(reports => {
                const select = document.getElementById('reportSelect');
                const list = document.getElementById('reportList');
                
                // Clear existing options (keep first one)
                select.innerHTML = '<option value="">-- Select a report --</option>';
                list.innerHTML = '';
                
                if (reports.length === 0) {
                    list.innerHTML = '<p style="color: #999;">No reports uploaded yet</p>';
                    return;
                }

                reports.forEach(report => {
                    // Add to dropdown
                    const option = document.createElement('option');
                    option.value = report;
                    option.textContent = report;
                    select.appendChild(option);

                    // Add to list
                    const item = document.createElement('div');
                    item.className = 'report-item';
                    item.textContent = report;
                    list.appendChild(item);
                });
            });
        }

        function loadDatasources() {
            fetch('/api/datasources')
            .then(response => response.json())
            .then(datasources => {
                const tableBody = document.getElementById('datasourceTableBody');
                const select = document.getElementById('datasourceSelect');
                
                // Clear existing
                tableBody.innerHTML = '';
                select.innerHTML = '<option value="">-- Use default datasource --</option>';
                
                if (datasources.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">No datasources configured</td></tr>';
                    return;
                }

                datasources.forEach(ds => {
                    // Add to table
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${ds.name}</td>
                        <td>${ds.url}</td>
                        <td>${ds.username}</td>
                        <td>${ds.driverClassName}</td>
                        <td>
                            <button class="btn-small" onclick="editDatasource(${ds.id})">Edit</button>
                            <button class="btn-small btn-danger" onclick="deleteDatasource(${ds.id})">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(row);

                    // Add to select
                    const option = document.createElement('option');
                    option.value = ds.id;
                    option.textContent = ds.name;
                    select.appendChild(option);
                });
            });
        }

        document.getElementById('generateForm').onsubmit = function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const params = new URLSearchParams();
            
            params.append('reportName', formData.get('reportName'));
            params.append('format', formData.get('format'));
            
            const useDatabase = document.getElementById('useDatabaseCheck').checked;
            params.append('useDatabase', useDatabase);
            
            if (useDatabase && formData.get('datasourceId')) {
                params.append('datasourceId', formData.get('datasourceId'));
            }

            fetch('/generate?' + params.toString(), {
                method: 'POST'
            })
            .then(response => {
                if (!response.ok) throw new Error('Generation failed');
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const format = formData.get('format');
                const reportName = formData.get('reportName').replace('.jrxml', '');
                a.download = reportName + '.' + format;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                showMessage('Report generated successfully!', 'success');
            })
            .catch(error => {
                showMessage('Generation failed: ' + error, 'error');
            });
        };

        // Datasource Modal Functions
        function openDatasourceModal(datasourceId = null) {
            const modal = document.getElementById('datasourceModal');
            const form = document.getElementById('datasourceForm');
            const title = document.getElementById('modalTitle');
            
            form.reset();
            document.getElementById('datasourceMessage').innerHTML = '';
            
            if (datasourceId) {
                title.textContent = 'Edit Datasource';
                // Load datasource data
                fetch('/api/datasources/' + datasourceId)
                .then(response => response.json())
                .then(ds => {
                    document.getElementById('datasourceId').value = ds.id;
                    document.getElementById('dsName').value = ds.name;
                    document.getElementById('dsUrl').value = ds.url;
                    document.getElementById('dsUsername').value = ds.username;
                    document.getElementById('dsPassword').value = ds.password;
                    document.getElementById('dsDriver').value = ds.driverClassName;
                });
            } else {
                title.textContent = 'Add Datasource';
                document.getElementById('datasourceId').value = '';
            }
            
            modal.style.display = 'block';
        }

        function closeDatasourceModal() {
            document.getElementById('datasourceModal').style.display = 'none';
        }

        function editDatasource(id) {
            openDatasourceModal(id);
        }

        function deleteDatasource(id) {
            if (!confirm('Are you sure you want to delete this datasource?')) return;
            
            fetch('/api/datasources/' + id, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    loadDatasources();
                } else {
                    showMessage(data.message, 'error');
                }
            })
            .catch(error => {
                showMessage('Failed to delete datasource: ' + error, 'error');
            });
        }

        document.getElementById('datasourceForm').onsubmit = function(e) {
            e.preventDefault();
            
            const id = document.getElementById('datasourceId').value;
            const formData = {
                name: document.getElementById('dsName').value,
                url: document.getElementById('dsUrl').value,
                username: document.getElementById('dsUsername').value,
                password: document.getElementById('dsPassword').value,
                driverClassName: document.getElementById('dsDriver').value
            };
            
            const url = id ? '/api/datasources/' + id : '/api/datasources';
            const method = id ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showDatasourceMessage(data.message, 'success');
                    setTimeout(() => {
                        closeDatasourceModal();
                        loadDatasources();
                    }, 1500);
                } else {
                    showDatasourceMessage(data.message, 'error');
                }
            })
            .catch(error => {
                showDatasourceMessage('Failed to save datasource: ' + error, 'error');
            });
        };

        function testDatasourceConnection() {
            const formData = {
                name: document.getElementById('dsName').value || 'test',
                url: document.getElementById('dsUrl').value,
                username: document.getElementById('dsUsername').value,
                password: document.getElementById('dsPassword').value,
                driverClassName: document.getElementById('dsDriver').value
            };
            
            fetch('/api/datasources/test', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showDatasourceMessage('✓ ' + data.message, 'success');
                } else {
                    showDatasourceMessage('✗ ' + data.message, 'error');
                }
            })
            .catch(error => {
                showDatasourceMessage('Test failed: ' + error, 'error');
            });
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        function showDatasourceMessage(text, type) {
            const msg = document.getElementById('datasourceMessage');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
        }

        // Drag and drop support
        const uploadArea = document.querySelector('.upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8ebff';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#f8f9ff';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9ff';
            const fileInput = document.getElementById('fileInput');
            fileInput.files = e.dataTransfer.files;
            uploadFile();
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('datasourceModal');
            if (event.target === modal) {
                closeDatasourceModal();
            }
        };
    </script>
</body>
</html>
