# Server configuration
server.port=8080
spring.application.name=Reports Server

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================================
# DATABASE CONFIGURATION - H2 is suitable for development only.
# For production, migrate to PostgreSQL, MySQL, or another enterprise database.
# See MIGRATION.md for migration instructions.
# ============================================================================
spring.datasource.url=jdbc:h2:file:./data/reportserver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console - DISABLED by default for security. Only enable in development.
# Set SPRING_H2_CONSOLE_ENABLED=true to enable for local development
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ============================================================================
# SECURITY CONFIGURATION
# ============================================================================
# Upload directory for JRXML templates and report files
# Set via environment variable REPORT_UPLOAD_DIR for custom locations
reportserver.upload.dir=${REPORT_UPLOAD_DIR:data/reports/}

# Datasource password encryption key - MUST be set in production
# Generate with: openssl rand -base64 32
# Set via environment variable: DATASOURCE_ENCRYPTION_KEY
reportserver.encryption.key=${DATASOURCE_ENCRYPTION_KEY:dev-key-only-for-local-testing}

# JWT configuration for API authentication
reportserver.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
reportserver.jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# JRXML upload validation - restrict dangerous classes
reportserver.jrxml.allowed-classes=${JRXML_ALLOWED_CLASSES:java.lang.String,java.lang.Integer,java.lang.Double,java.lang.Boolean,java.lang.Math,java.lang.System}

# Quartz scheduler configuration (persistent jobs, survives restart)
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.scheduler.instanceName=ReportServerScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000

# Default API pagination
reportserver.pagination.default-page-size=20
reportserver.pagination.max-page-size=200

# Logging (adjust based on environment)
logging.level.root=INFO
logging.level.com.reportserver=INFO

# ReportServer Font Configuration
net.sf.jasperreports.awt.ignore.missing.font=true
net.sf.jasperreports.default.font.name=SansSerif
net.sf.jasperreports.default.pdf.font.name=Helvetica

# Actuator endpoints for health monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Error handling configuration
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.path=/error

# ============================================================================
# REPORT THUMBNAIL GENERATION (Feature 11)
# ============================================================================
report.thumbnail.directory=${REPORT_THUMBNAIL_DIR:data/thumbnails}
report.thumbnail.page=0
report.thumbnail.scale=0.25

# ============================================================================
# REPORT DELIVERY OPTIONS (Feature 12) - EMAIL & WEBHOOK
# ============================================================================
# SMTP Configuration for email delivery
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@reportserver.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.default-encoding=UTF-8

# Report delivery (email/webhook) configuration
report.delivery.webhook.timeout=30000
report.delivery.webhook.retries=3

# ============================================================================
# REPORT IMPORT/EXPORT (Feature 15)
# ============================================================================
report.export.directory=${REPORT_EXPORT_DIR:data/exports}

# ============================================================================
# MULTI-TENANCY / WORKSPACE ISOLATION (Feature 13)
# ============================================================================
# Workspace isolation model: per-user
workspace.isolation.enabled=true
workspace.default.name=My Workspace

# ============================================================================
# API KEY MANAGEMENT (Feature 14)
# ============================================================================
# API key configuration
api.key.length=32
api.key.prefix=reportkey_
api.key.max-per-user=10
