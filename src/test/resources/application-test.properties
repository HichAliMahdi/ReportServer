# Test profile configuration
spring.application.name=Report Server Test

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Quartz for tests to avoid scheduler interference
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=false

# Disable mail for tests
spring.mail.host=localhost
spring.mail.port=25025
spring.mail.username=test
spring.mail.password=test

# Test report storage
reports.storage.path=./target/test-reports
reports.generated.path=./target/test-generated

# JWT Configuration
jwt.secret=test-secret-key-for-jwt-token-generation-in-unit-tests-only-not-for-production
jwt.expiration=3600000

# Logging
logging.level.com.reportserver=DEBUG
logging.level.org.springframework.security=WARN
